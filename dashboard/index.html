<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelEdge Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #38bdf8;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }
        .card {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SentinelEdge Dashboard</h1>
        <div class="card">
            <h2>System Status</h2>
            <p>Telemetry Ingestion: Active</p>
            <p>Model Status: Running (NF4 Quantized)</p>
        </div>
    </div>
</body>
</html>
